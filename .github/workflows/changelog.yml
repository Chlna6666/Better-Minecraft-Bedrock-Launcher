name: Changelog

on:
  push:
    branches:
      - master
    paths-ignore:
      - CHANGELOG.md
  workflow_dispatch:
    inputs:
      since:
        description: "Optional starting tag, for example v0.1.3"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Update changelog
        env:
          SINCE_TAG: ${{ inputs.since }}
        shell: pwsh
        run: |
          $arguments = @{
            OutputPath = "CHANGELOG.md"
            ReplaceUnreleased = $true
          }
          if (-not [string]::IsNullOrWhiteSpace($env:SINCE_TAG)) {
            $arguments.SinceTag = $env:SINCE_TAG
          }
          & pwsh -NoProfile -File scripts/generate_changelog.ps1 @arguments

      - name: Commit changelog changes
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "CHANGELOG.md is already up to date."
            exit 0
          }

          git commit -m "docs(changelog): update generated changelog"
          git push origin HEAD:${{ github.ref_name }}

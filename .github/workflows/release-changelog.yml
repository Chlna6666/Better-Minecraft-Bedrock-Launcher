name: Archive Stable Changelog

on:
  push:
    tags:
      - "v*"
      - "!v*-nightly.*"

permissions:
  contents: write

jobs:
  archive:
    runs-on: windows-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: master
          persist-credentials: true

      - name: Archive released changes
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Stable release tag is invalid: $tag"
          }

          $version = $tag.Substring(1)
          $releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd")
          & pwsh -NoProfile -File scripts/generate_changelog.ps1 `
            -ArchiveRelease `
            -Version $version `
            -ReleaseDate $releaseDate

      - name: Commit archived changelog
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "CHANGELOG.md is already archived for this release."
            exit 0
          }

          git commit -m "docs(changelog): 归档稳定版 ${{ github.ref_name }}"
          git push origin HEAD:master

name: Backdrop blur validation

on:
  push:
    branches:
      - codex/backdrop-blur-fix
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  check-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Apply validation patch
        shell: pwsh
        run: |
          $compressed = [Convert]::FromBase64String("")
          $input = [IO.MemoryStream]::new($compressed)
          $gzip = [IO.Compression.GZipStream]::new($input, [IO.Compression.CompressionMode]::Decompress)
          $output = [IO.File]::Create("backdrop-blur.patch")
          $gzip.CopyTo($output)
          $output.Dispose()
          $gzip.Dispose()
          $input.Dispose()
          git apply --whitespace=nowarn backdrop-blur.patch
      - name: Check GPUI Nova DX12
        run: cargo check --manifest-path vendor/gpui/Cargo.toml --no-default-features --features "nova-gfx,nova-gfx-dx12"
      - name: Test backdrop blur
        run: cargo test --manifest-path vendor/gpui/Cargo.toml --no-default-features --features "nova-gfx,nova-gfx-dx12" backdrop_blur --lib
      - name: Check BMCBL
        run: cargo check --bin BMCBL

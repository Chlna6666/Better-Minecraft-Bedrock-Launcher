name: Apply Linux raw-window-handle fix

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/apply-linux-rwh-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Unify raw-window-handle trait source
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("vendor/gpui/src/platform/platform_traits.rs")
          text = path.read_text(encoding="utf-8")
          old = "use ::winit::raw_window_handle::{HasDisplayHandle, HasWindowHandle};"
          new = "use raw_window_handle::{HasDisplayHandle, HasWindowHandle};"
          if old not in text:
              raise SystemExit(f"expected import not found in {path}")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Commit fix to master
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vendor/gpui/src/platform/platform_traits.rs
          git commit -m "fix(gpui): unify Linux raw-window-handle traits"
          git push origin HEAD:master

[package]
name = "bmcbl"
version = "0.1.0"
license = "GPL-3.0-only"
description = "一个minecraft bedrock启动器"
authors = ["Chlna6666"]
edition = "2024"
build = "build.rs"

[lib]
path = "src/lib.rs"

[[bin]]
name = "BMCBL"
path = "src/main.rs"

[lints.rust]
unsafe_code = "warn"

[lints.clippy]
all = "warn"
pedantic = "warn"

[build-dependencies]
chrono = "0.4.44"
hex = "0.4.3"
toml = "1.0.3"

[dependencies]
mimalloc = { version = "0.1.52", features = ["extended"] }
libmimalloc-sys = { version = "0.1.49", default-features = false, features = ["extended"] }
gpui = { path = "vendor/gpui", default-features = false, features = ["mimalloc-collect", "nova-gfx", "nova-gfx-dx12", "nova-gfx-vulkan"] }
gpui-router = { version = "0.3.0", default-features = false, features = [] }
gpui_hooks = { path = "crates/gpui-hooks" }
lucide-gpui = { path = "crates/lucide-gpui" }
image = { version = "0.25.9", default-features = false, features = ["png", "tga"] }
mc-motd = { path = "../BE-Community-Dev/mc-motd" }
bedrock-world = { path = "../BE-Community-Dev/bedrock-world" }
bedrock-block-model = { path = "../BE-Community-Dev/bedrock-block-model" }

serde = { version = "1.0.219", features = ["derive", "rc"] }
cidr = "0.3.1"
sysinfo = "0.39.0"
toml = "1.1.2+spec"
toml_edit = "0.25.11+spec-1.1.0"
once_cell = "1.21.3"
chrono = "0.4.42"
serde_json="1.0.145"
zip = { version = "9.0.0-pre2", default-features = false, features = ["deflate-flate2"] }
tracing = "0.1.43"
tracing-log = "0.2.0"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
tokio = { version = "1.48.0", features = ["rt", "rt-multi-thread", "macros", "process", "net", "io-util", "sync", "time"] }
tokio-stream = { version = "0.1.17", features = ["fs"] }
reqwest = { version = "0.13.2", features = ["stream", "gzip", "brotli", "deflate", "zstd", "json", "blocking"] }
sentry = { version = "0.48.2", default-features = false, features = ["backtrace", "contexts", "logs", "transport"] }
futures = "0.3.31"
futures-util = "0.3.31"
xmltree = "0.12.0"
thiserror = "2.0.17"
uuid = { version = "1.19.0", features = ["v4"] }
num_cpus = "1.16.0"
regex = "1.12.2"
anyhow = "1.0.100"
url = "2.5.4"
lofty = "0.23.2"
unicode-segmentation = "1.12.0"
ttf-parser = "0.25.1"
rand = "0.10.0"
rodio = { version = "0.22.2", default-features = false, features = ["playback", "mp3", "mp4", "wav", "flac", "vorbis"] }

rayon = "1.11.0"
aes = "0.8.4"
indexmap = { version = "2.12.1", features = ["serde"] }
walkdir = "2.5.0"
md5 = "0.8.0"
semver = "1.0.27"
hex = "0.4.3"
sha2 = "0.11.0"
clap = { version = "4.5.53", features = ["derive"] }
bytes = "1.10.1"
bytemuck = { version = "1.25.0", features = ["derive"] }
byteorder = "1.5.0"
postcard = { version = "1.1.3", default-features = false, features = ["alloc"] }
pelite = "0.10.0"
zstd = "0.13.3"
pulldown-cmark = "0.13.0"
scraper = "0.27.0"
ego-tree = "0.11.0"
csscolorparser = "0.8.0"
tinywasm = { version = "0.9.0", default-features = false, features = ["std", "parser", "archive"] }
notify = "8.2.0"
bmcbl_plugin_api = { path = "crates/bmcbl-plugin-api" }

# Enable `socks5` (implies `smoltcp`) so `no_tun` mode can still proxy/port-forward traffic
# to EasyTier overlay IPs, matching PaperConnect's typical usage.
easytier = { git = "https://github.com/Chlna6666/EasyTier", branch = "main", default-features = false, features = ["tun", "wireguard", "socks5", "zstd"] }
rfd = "0.17.2"

[features]
preview-3d-dx12 = []
gpui-windows-vulkan = ["gpui/nova-gfx-vulkan"]

[workspace]
resolver = "3"
members = [
    "crates/bmcbl-plugin-api",
    "crates/bmcbl-plugin-macros",
    "crates/nova-gfx/gfx-core",
    "crates/nova-gfx/gfx-memory",
    "crates/nova-gfx/gfx-shader",
    "crates/nova-gfx/gfx-dx12",
    "crates/nova-gfx/gfx-metal",
    "crates/nova-gfx/gfx-opengl",
    "crates/nova-gfx/gfx-vulkan",
    "crates/nova-gfx/gfx-webgl",
    "crates/nova-gfx/examples/triangle",
    "crates/nova-gfx/examples/triangle-dx12",
    "crates/nova-gfx/examples/triangle-metal",
    "crates/nova-gfx/examples/atlas-smoke",
    "crates/nova-gfx/examples/atlas-smoke-dx12",
    "crates/nova-gfx/examples/atlas-smoke-metal",
    "crates/nova-gfx/examples/public-api-smoke",
    "crates/nova-gfx/examples/gpui-minimal-window-smoke",
]

[target.'cfg(windows)'.dependencies]
bedrock-render = { path = "../BE-Community-Dev/bedrock-render", default-features = false, features = ["async", "webp", "gpu-dx11"] }
windows = { version = "0.62.2", features = ["ApplicationModel", "ApplicationModel_Activation", "Foundation", "Foundation_Collections", "Graphics_Capture", "Graphics_DirectX", "Graphics_DirectX_Direct3D11", "Management", "Management_Deployment", "Storage_Search", "System", "Win32_Foundation", "Win32_Globalization", "Win32_Graphics_Direct3D", "Win32_Graphics_Direct3D11", "Win32_Graphics_Dwm", "Win32_Graphics_Dxgi", "Win32_Graphics_Dxgi_Common", "Win32_Graphics_Gdi", "Win32_Security", "Win32_Security_Authorization", "Win32_Storage_FileSystem", "Win32_Storage_Packaging_Appx", "Win32_System_ApplicationInstallationAndServicing", "Win32_System_Com", "Win32_System_Console", "Win32_System_Diagnostics_Debug", "Win32_System_Diagnostics_ToolHelp", "Win32_System_LibraryLoader", "Win32_System_Memory", "Win32_System_ProcessStatus", "Win32_System_Registry", "Win32_System_SystemInformation", "Win32_System_Threading", "Win32_System_WinRT", "Win32_System_WinRT_Direct3D11", "Win32_UI_Controls", "Win32_UI_Input_KeyboardAndMouse", "Win32_UI_Shell", "Win32_UI_WindowsAndMessaging"] }
winreg = "0.56.0"

[target.'cfg(windows)'.build-dependencies]
winres = "0.1"

[target.'cfg(not(windows))'.dependencies]
bedrock-render = { path = "../BE-Community-Dev/bedrock-render", default-features = false, features = ["async", "webp"] }

[patch.crates-io]
gpui = { path = "vendor/gpui" }
gpu-allocator = { path = "vendor/gpu-allocator" }
gpui-router = { path = "vendor/gpui-router" }

[profile.release]
opt-level = "s"       # 优化代码体积 ("s" = 小体积, "z" = 最小体积)
lto = "fat"           # 启用 Link Time Optimization
codegen-units = 1       # 单代码生成单元，有助于优化整个 crate
panic = "abort"         # 遇到 panic 直接 abort，而不是展开堆栈（减少体积）
strip = true            # 移除调试符号（从 Rust 1.73 起支持）
incremental = false
debug = 0


[profile.dev]
opt-level = 3
panic = "unwind"        # 开发模式保留回溯，便于定位崩溃
